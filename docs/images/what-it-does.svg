<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1000" height="420" fill="#fcfcfb" />

  <text x="500" y="56" text-anchor="middle" font-size="28" font-weight="700" fill="#0b0b0b">INSERT — 7つのキーがそれぞれ個別のグループとして登録される</text>
  <text x="500" y="86" text-anchor="middle" font-size="16" fill="#52514e">a〜g はまだ互いに無関係（サイズ1の集合が7つ）</text>

  <!-- a -->
  <g>
    <ellipse cx="100" cy="250" rx="72" ry="72" fill="none" stroke="#898781" stroke-width="1.5" stroke-dasharray="6 6" />
    <circle cx="100" cy="250" r="50" fill="#2a78d6" stroke="rgba(11,11,11,0.10)" stroke-width="1" />
    <text x="100" y="262" text-anchor="middle" font-size="32" font-weight="700" fill="#ffffff">a</text>
  </g>

  <!-- b -->
  <g>
    <ellipse cx="230" cy="250" rx="72" ry="72" fill="none" stroke="#898781" stroke-width="1.5" stroke-dasharray="6 6" />
    <circle cx="230" cy="250" r="50" fill="#1baf7a" stroke="rgba(11,11,11,0.10)" stroke-width="1" />
    <text x="230" y="262" text-anchor="middle" font-size="32" font-weight="700" fill="#ffffff">b</text>
  </g>

  <!-- c -->
  <g>
    <ellipse cx="360" cy="250" rx="72" ry="72" fill="none" stroke="#898781" stroke-width="1.5" stroke-dasharray="6 6" />
    <circle cx="360" cy="250" r="50" fill="#eda100" stroke="rgba(11,11,11,0.10)" stroke-width="1" />
    <text x="360" y="262" text-anchor="middle" font-size="32" font-weight="700" fill="#0b0b0b">c</text>
  </g>

  <!-- d -->
  <g>
    <ellipse cx="490" cy="250" rx="72" ry="72" fill="none" stroke="#898781" stroke-width="1.5" stroke-dasharray="6 6" />
    <circle cx="490" cy="250" r="50" fill="#008300" stroke="rgba(11,11,11,0.10)" stroke-width="1" />
    <text x="490" y="262" text-anchor="middle" font-size="32" font-weight="700" fill="#ffffff">d</text>
  </g>

  <!-- e -->
  <g>
    <ellipse cx="620" cy="250" rx="72" ry="72" fill="none" stroke="#898781" stroke-width="1.5" stroke-dasharray="6 6" />
    <circle cx="620" cy="250" r="50" fill="#4a3aa7" stroke="rgba(11,11,11,0.10)" stroke-width="1" />
    <text x="620" y="262" text-anchor="middle" font-size="32" font-weight="700" fill="#ffffff">e</text>
  </g>

  <!-- f -->
  <g>
    <ellipse cx="750" cy="250" rx="72" ry="72" fill="none" stroke="#898781" stroke-width="1.5" stroke-dasharray="6 6" />
    <circle cx="750" cy="250" r="50" fill="#e34948" stroke="rgba(11,11,11,0.10)" stroke-width="1" />
    <text x="750" y="262" text-anchor="middle" font-size="32" font-weight="700" fill="#ffffff">f</text>
  </g>

  <!-- g -->
  <g>
    <ellipse cx="880" cy="250" rx="72" ry="72" fill="none" stroke="#898781" stroke-width="1.5" stroke-dasharray="6 6" />
    <circle cx="880" cy="250" r="50" fill="#e87ba4" stroke="rgba(11,11,11,0.10)" stroke-width="1" />
    <text x="880" y="262" text-anchor="middle" font-size="32" font-weight="700" fill="#0b0b0b">g</text>
  </g>

  <text x="500" y="370" text-anchor="middle" font-size="14" fill="#898781">破線＝1つの集合（グループ）の境界。今はキー1つにつき1グループ</text>
</svg>
